global:
  scrape_interval: 2s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000

  - job_name: benchmark-client
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9001

  - job_name: nvidia-dcgm
    static_configs:
      - targets:
          - dcgm-exporter:9400
